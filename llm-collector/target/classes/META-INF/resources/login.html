<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TraceLM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 flex items-center justify-center p-6">
<div class="w-full max-w-md rounded-[28px] border border-slate-800 bg-slate-900/90 p-8 shadow-2xl shadow-sky-950/30">
    <a href="/" class="text-sky-300 text-sm">← Back to landing</a>
    <h1 class="mt-6 text-3xl font-semibold">Welcome back</h1>
    <p class="mt-2 text-slate-400">Sign in to access your TraceLM dashboard.</p>

    <form id="loginForm" class="mt-8 space-y-4">
        <div>
            <label class="block text-sm text-slate-300 mb-2" for="email">Email</label>
            <input id="email" name="email" type="email" required class="w-full rounded-2xl border border-slate-700 bg-slate-950 px-4 py-3 outline-none focus:border-sky-400">
        </div>
        <div>
            <label class="block text-sm text-slate-300 mb-2" for="password">Password</label>
            <input id="password" name="password" type="password" required class="w-full rounded-2xl border border-slate-700 bg-slate-950 px-4 py-3 outline-none focus:border-sky-400">
        </div>
        <p id="errorMessage" class="hidden text-sm text-rose-300 rounded-xl bg-rose-500/10 border border-rose-500/20 px-3 py-2"></p>
        <button type="submit" class="w-full rounded-2xl bg-sky-400 px-4 py-3 font-semibold text-slate-950 hover:bg-sky-300 transition">Login</button>
    </form>

    <p class="mt-6 text-sm text-slate-400">
        Need an account?
        <a href="/signup.html" class="text-sky-300 hover:text-sky-200">Create one</a>
    </p>
</div>

<script>
    async function redirectIfAuthenticated() {
        const response = await fetch('/auth/me');
        if (response.ok) {
            window.location.href = '/dashboard.html';
        }
    }

    document.getElementById('loginForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        const errorMessage = document.getElementById('errorMessage');
        errorMessage.classList.add('hidden');

        const payload = {
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        };

        const response = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (!response.ok) {
            const error = await response.json().catch(() => ({ message: 'Login failed' }));
            errorMessage.textContent = error.message || 'Login failed';
            errorMessage.classList.remove('hidden');
            return;
        }

        window.location.href = '/dashboard.html';
    });

    redirectIfAuthenticated();
</script>
</body>
</html>
