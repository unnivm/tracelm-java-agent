quarkus.http.port=${HTTP_PORT:8080}

quarkus.datasource.db-kind=${DB_KIND:postgresql}
quarkus.datasource.username=${DB_USERNAME:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/llm_collector}

quarkus.hibernate-orm.database.generation=validate
quarkus.hibernate-orm.log.sql=${HIBERNATE_LOG_SQL:false}

quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true

quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ORIGINS:*}
quarkus.http.limits.max-body-size=${MAX_BODY_SIZE:2M}

quarkus.smallrye-health.root-path=/q/health

collector.security.api-key=${COLLECTOR_API_KEY:}
collector.retention.days=${TRACE_RETENTION_DAYS:30}
collector.retention.cleanup-interval=${TRACE_RETENTION_CLEANUP_INTERVAL:24h}
collector.auth.session-days=${AUTH_SESSION_DAYS:7}
